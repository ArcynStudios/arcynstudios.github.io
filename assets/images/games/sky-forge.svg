<svg viewBox="0 0 300 169" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sfBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#051015"/>
      <stop offset="40%" style="stop-color:#1a3a5c"/>
      <stop offset="70%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#ff8c42"/>
    </linearGradient>
    <linearGradient id="sfSun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff"/>
      <stop offset="50%" style="stop-color:#fff8c0"/>
      <stop offset="100%" style="stop-color:#ffaa00"/>
    </linearGradient>
    <linearGradient id="sfBlock" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5b7"/>
      <stop offset="50%" style="stop-color:#d4c4a8"/>
      <stop offset="100%" style="stop-color:#c9b896"/>
    </linearGradient>
    <linearGradient id="sfGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffaa00"/>
      <stop offset="50%" style="stop-color:#ffff00"/>
      <stop offset="100%" style="stop-color:#ffaa00"/>
    </linearGradient>
    <radialGradient id="sfGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffaa00;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow6" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow7" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="300" height="169" fill="url(#sfBg)"/>
  <!-- God rays -->
  <g filter="url(#glow6)" opacity="0.15">
    <path d="M240,15 L150,154 L165,154 Z" fill="url(#sfSun)"/>
    <path d="M165,15 L150,154 L140,154 Z" fill="url(#sfSun)"/>
    <path d="M140,15 L150,154 L135,154 Z" fill="url(#sfSun)"/>
    <path d="M135,15 L150,154 L130,154 Z" fill="url(#sfSun)"/>
    <path d="M130,15 L150,154 L120,154 Z" fill="url(#sfSun)"/>
    <path d="M120,15 L150,154 L110,154 Z" fill="url(#sfSun)"/>
  </g>
  <!-- Sun -->
  <circle cx="150" cy="15" r="18" fill="url(#sfSun)" filter="url(#glow7)">
    <animate attributeName="r" values="18;20;18" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="15" r="35" fill="none" stroke="#ffaa00" stroke-width="1" opacity="0.3" filter="url(#glow7)">
    <animate attributeName="r" values="35;40;35" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- Clouds -->
  <g opacity="0.7" filter="url(#glow7)">
    <ellipse cx="40" cy="25" rx="25" ry="12" fill="#f5e6c8">
      <animate attributeName="cx" values="40;45;40" dur="20s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="260" cy="35" rx="30" ry="15" fill="#faefe0">
      <animate attributeName="cx" values="260;255;260" dur="25s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="150" cy="15" rx="40" ry="18" fill="#fff8e7">
      <animate attributeName="cx" values="150;155;150" dur="30s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="80" cy="60" rx="20" ry="10" fill="#ffe8c4">
      <animate attributeName="cx" values="80;85;80" dur="18s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="220" cy="55" rx="25" ry="12" fill="#ffd8a0">
      <animate attributeName="cx" values="220;215;220" dur="22s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  <!-- Birds -->
  <g stroke="#8b7355" stroke-width="1.5" fill="none" opacity="0.8" filter="url(#glow7)">
    <path d="M20,40 Q15,35 10,40 Q15,35 20,40">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="280 0" dur="15s" repeatCount="indefinite"/>
    </path>
    <path d="M280,55 Q275,50 270,55 Q275,50 280,55">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-280 0" dur="12s" repeatCount="indefinite"/>
    </path>
    <path d="M50,70 Q45,65 40,70 Q45,65 50,70">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="250 0" dur="18s" repeatCount="indefinite"/>
    </path>
    <path d="M250,85 Q245,80 240,85 Q245,80 250,85">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-250 0" dur="14s" repeatCount="indefinite"/>
    </path>
    <path d="M100,95 Q95,90 90,95 Q95,90 100,95">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="200 0" dur="16s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- Tower blocks -->
  <g filter="url(#glow7)">
    <!-- Base platform -->
    <rect x="50" y="145" width="200" height="18" rx="4" fill="url(#sfBlock)" stroke="#8b7355" stroke-width="2"/>
    <!-- Stacked blocks -->
    <rect x="80" y="125" width="140" height="16" rx="3" fill="url(#sfBlock)" stroke="#a08d6b" stroke-width="1.5">
      <animate attributeName="y" values="125;122;125" dur="0.5s" begin="0.5s" repeatCount="1"/>
    </rect>
    <rect x="90" y="107" width="120" height="16" rx="3" fill="url(#sfBlock)" stroke="#b89f7a" stroke-width="1.5">
      <animate attributeName="y" values="107;104;107" dur="0.5s" begin="1s" repeatCount="1"/>
    </rect>
    <rect x="100" y="89" width="100" height="16" rx="3" fill="url(#sfBlock)" stroke="#c9b896" stroke-width="1.5">
      <animate attributeName="y" values="89;86;89" dur="0.5s" begin="1.5s" repeatCount="1"/>
    </rect>
    <rect x="110" y="71" width="80" height="16" rx="3" fill="url(#sfBlock)" stroke="#d4c4a8" stroke-width="1.5">
      <animate attributeName="y" values="71;68;71" dur="0.5s" begin="2s" repeatCount="1"/>
    </rect>
    <rect x="120" y="53" width="60" height="16" rx="3" fill="url(#sfBlock)" stroke="#e8d5b7" stroke-width="1.5">
      <animate attributeName="y" values="53;50;53" dur="0.5s" begin="2.5s" repeatCount="1"/>
    </rect>
    <rect x="125" y="35" width="50" height="16" rx="3" fill="url(#sfBlock)" stroke="#f0dbc8" stroke-width="1.5">
      <animate attributeName="y" values="35;32;35" dur="0.5s" begin="3s" repeatCount="1"/>
    </rect>
    <rect x="130" y="17" width="40" height="16" rx="3" fill="url(#sfBlock)" stroke="#f5e6c8" stroke-width="1.5">
      <animate attributeName="y" values="17;14;17" dur="0.5s" begin="3.5s" repeatCount="1"/>
    </rect>
    <!-- Current falling block -->
    <rect x="125" y="-20" width="50" height="16" rx="3" fill="url(#sfGold)" stroke="#ffaa00" stroke-width="2" filter="url(#glow6)">
      <animate attributeName="y" values="-20;0;17" dur="2s" begin="4s" repeatCount="1"/>
      <animate attributeName="x" values="125;130;125" dur="1s" begin="4s" repeatCount="1"/>
    </rect>
    <!-- Perfect indicator -->
    <text x="150" y="160" text-anchor="middle" font-family="Sora, sans-serif" font-size="10" font-weight="bold" fill="#ffaa00" filter="url(#glow6)" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="0.5s" begin="5.5s" repeatCount="1"/>PERFECT!
    </text>
  </g>
  <!-- Moving platform -->
  <rect x="30" y="80" width="60" height="10" rx="2" fill="#ff6b35" stroke="#ffaa00" stroke-width="2" filter="url(#glow7)" opacity="0.9">
    <animate attributeName="x" values="30;210;30" dur="5s" repeatCount="indefinite"/>
  </rect>
  <!-- Particles -->
  <g filter="url(#glow7)">
    <circle cx="150" cy="10" r="2" fill="#ffff00">
      <animate attributeName="cy" values="10;50;10" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="140" cy="15" r="1.5" fill="#ffaa00">
      <animate attributeName="cy" values="15;55;15" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="12" r="1.5" fill="#fff">
      <animate attributeName="cy" values="12;52;12" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Floating crystals/gems -->
  <g filter="url(#glow7)">
    <polygon points="280,20 285,10 290,20 287,25 283,25" fill="#ffaa00">
      <animateTransform attributeName="transform" type="rotate" from="0 285 20" to="360 285 20" dur="4s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="20,20 25,10 30,20 27,25 23,25" fill="#ffaa00">
      <animateTransform attributeName="transform" type="rotate" from="0 25 20" to="-360 25 20" dur="3s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <!-- Title -->
  <text x="150" y="158" text-anchor="middle" font-family="Sora, sans-serif" font-size="16" font-weight="800" fill="url(#sfGold)" filter="url(#glow6)">SKY FORGE</text>
</svg>