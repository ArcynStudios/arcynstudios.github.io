<svg viewBox="0 0 300 169" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vrBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#030308"/>
      <stop offset="30%" style="stop-color:#0a0515"/>
      <stop offset="70%" style="stop-color:#150520"/>
      <stop offset="100%" style="stop-color:#050510"/>
    </linearGradient>
    <linearGradient id="vrNeon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c5cff"/>
      <stop offset="50%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#ff00ff"/>
    </linearGradient>
    <linearGradient id="vrPlayer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="50%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#7c5cff"/>
    </linearGradient>
    <filter id="glow6" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow7" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="300" height="169" fill="url(#vrBg)"/>
  <!-- Neon grid lines -->
  <g stroke="url(#vrNeon)" stroke-width="1" opacity="0.15" filter="url(#glow7)">
    <line x1="0" y1="25" x2="300" y2="25"/>
    <line x1="0" y1="50" x2="300" y2="50"/>
    <line x1="0" y1="75" x2="300" y2="75"/>
    <line x1="0" y1="100" x2="300" y2="100"/>
    <line x1="0" y1="125" x2="300" y2="125"/>
    <line x1="50" y1="0" x2="50" y2="169"/>
    <line x1="100" y1="0" x2="100" y2="169"/>
    <line x1="150" y1="0" x2="150" y2="169"/>
    <line x1="200" y1="0" x2="200" y2="169"/>
    <line x1="250" y1="0" x2="250" y2="169"/>
  </g>
  <!-- Buildings in background -->
  <g fill="#1a0a2e" stroke="#7c5cff" stroke-width="1" filter="url(#glow6)" opacity="0.6">
    <rect x="10" y="100" width="30" height="60" rx="3">
      <animate attributeName="height" values="60;70;60" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="50" y="80" width="25" height="80" rx="3">
      <animate attributeName="height" values="80;90;80" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="240" y="90" width="35" height="70" rx="3">
      <animate attributeName="height" values="70;80;70" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="200" y="60" width="20" height="100" rx="3">
      <animate attributeName="height" values="100;110;100" dur="4.5s" repeatCount="indefinite"/>
    </rect>
  </g>
  <!-- Rain -->
  <g stroke="#00ffff" stroke-width="1" opacity="0.4" filter="url(#glow7)">
    <line x1="20" y1="-10" x2="25" y2="20">
      <animate attributeName="y1" values="-10;180;-10" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="20;210;20" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="60" y1="-20" x2="65" y2="10">
      <animate attributeName="y1" values="-20;190;-20" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="10;220;10" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <line x1="100" y1="-5" x2="105" y2="25">
      <animate attributeName="y1" values="-5;175;-5" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="25;205;25" dur="1.2s" repeatCount="indefinite"/>
    </line>
    <line x1="140" y1="-15" x2="145" y2="15">
      <animate attributeName="y1" values="-15;185;-15" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="15;215;15" dur="0.9s" repeatCount="indefinite"/>
    </line>
    <line x1="180" y1="-10" x2="185" y2="20">
      <animate attributeName="y1" values="-10;180;-10" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="20;210;20" dur="1.1s" repeatCount="indefinite"/>
    </line>
    <line x1="220" y1="-25" x2="225" y2="5">
      <animate attributeName="y1" values="-25;195;-25" dur="0.7s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="5;225;5" dur="0.7s" repeatCount="indefinite"/>
    </line>
    <line x1="260" y1="-5" x2="265" y2="25">
      <animate attributeName="y1" values="-5;175;-5" dur="1.3s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="25;205;25" dur="1.3s" repeatCount="indefinite"/>
    </line>
    <line x1="280" y1="-20" x2="285" y2="10">
      <animate attributeName="y1" values="-20;190;-20" dur="0.85s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="10;220;10" dur="0.85s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Lightning -->
  <g filter="url(#glow6)">
    <polyline points="50,0 70,40 55,40 85,80 65,80 95,120 55,120 75,169" fill="none" stroke="#8888ff" stroke-width="2" opacity="0.6">
      <animate attributeName="opacity" values="0;0.6;0" dur="3s" repeatCount="indefinite"/>
    </polyline>
    <polyline points="250,0 230,35 245,35 215,75 235,75 205,115 245,115 225,169" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.5">
      <animate attributeName="opacity" values="0;0.5;0" dur="4s" repeatCount="indefinite"/>
    </polyline>
  </g>
  <!-- Lanes -->
  <g stroke="url(#vrNeon)" stroke-width="2" opacity="0.3" stroke-dasharray="15,10" filter="url(#glow7)">
    <line x1="100" y1="0" x2="100" y2="169"/>
    <line x1="200" y1="0" x2="200" y2="169"/>
  </g>
  <!-- Obstacles -->
  <g filter="url(#glow6)">
    <!-- Laser -->
    <rect x="0" y="35" width="300" height="4" fill="#ff0066" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <!-- Barrier lane 1 -->
    <rect x="15" y="60" width="60" height="25" rx="4" fill="#7c5cff">
      <animate attributeName="x" values="15;-80;15" dur="3s" repeatCount="indefinite"/>
    </rect>
    <!-- Barrier lane 3 -->
    <rect x="225" y="90" width="60" height="25" rx="4" fill="#ff5c8a">
      <animate attributeName="x" values="225;305;225" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <!-- Gap in lane 2 -->
    <rect x="100" y="110" width="100" height="20" rx="4" fill="#000" opacity="0"/>
    <rect x="100" y="110" width="100" height="20" rx="4" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="10,5" filter="url(#glow7)">
      <animate attributeName="stroke-dashoffset" values="0;30" dur="1s" repeatCount="indefinite"/>
    </rect>
    <!-- Double laser -->
    <rect x="0" y="130" width="300" height="3" fill="#00ffff" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="138" width="300" height="3" fill="#00ffff" opacity="0.7">
      <animate attributeName="opacity" values="0;0.7;0" dur="1s" repeatCount="indefinite"/>
    </rect>
    <!-- Moving barrier -->
    <rect x="100" y="150" width="50" height="20" rx="4" fill="#ff5c8a" filter="url(#glow6)">
      <animate attributeName="x" values="100;150;100" dur="2s" repeatCount="indefinite"/>
    </rect>
    <!-- Crystal wall -->
    <g filter="url(#glow6)">
      <rect x="80" y="15" width="40" height="35" rx="3" fill="#ffff00" opacity="0.8">
        <animate attributeName="opacity" values="0.8;1;0.8" dur="1s" repeatCount="indefinite"/>
      </rect>
      <polygon points="100,25 108,15 116,25 112,30 104,30" fill="#ffff00">
        <animateTransform attributeName="transform" type="rotate" from="0 100 25" to="360 100 25" dur="2s" repeatCount="indefinite"/>
      </polygon>
    </g>
  </g>
  <!-- Crystals -->
  <g filter="url(#glow6)">
    <polygon points="85,45 90,35 95,45 92,50 88,50" fill="#ffff00">
      <animateTransform attributeName="transform" type="rotate" from="0 90 45" to="360 90 45" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="200,55 205,45 210,55 207,60 203,60" fill="#ffff00">
      <animateTransform attributeName="transform" type="rotate" from="0 205 55" to="-360 205 55" dur="3s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="40,85 45,75 50,85 47,90 43,90" fill="#ffff00">
      <animateTransform attributeName="transform" type="rotate" from="0 45 85" to="360 45 85" dur="2.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="260,75 265,65 270,75 267,80 263,80" fill="#ffff00">
      <animateTransform attributeName="transform" type="rotate" from="0 265 75" to="-360 265 75" dur="2.8s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="150,120 155,110 160,120 157,125 153,125" fill="#ffff00">
      <animateTransform attributeName="transform" type="rotate" from="0 155 120" to="360 155 120" dur="2.2s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <!-- Player -->
  <g filter="url(#glow6)">
    <ellipse cx="150" cy="130" rx="20" ry="14" fill="url(#vrPlayer)">
      <animate attributeName="ry" values="14;16;14" dur="0.2s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Eyes -->
    <circle cx="140" cy="126" r="4" fill="#fff" filter="url(#glow7)">
      <animate attributeName="opacity" values="1;0.1;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="126" r="4" fill="#fff" filter="url(#glow7)">
      <animate attributeName="opacity" values="1;0.1;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Trail -->
    <ellipse cx="150" cy="140" rx="25" ry="8" fill="none" stroke="#00ffff" stroke-width="3" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0;0.5" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="140;150;140" dur="0.5s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  <!-- Speed lines -->
  <g stroke="#00ffff" stroke-width="1" opacity="0.3" filter="url(#glow7)">
    <line x1="0" y1="20" x2="300" y2="20">
      <animate attributeName="y1" values="20;189;20" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="20;189;20" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="60" x2="300" y2="60">
      <animate attributeName="y1" values="60;229;60" dur="0.6s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="60;229;60" dur="0.6s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="100" x2="300" y2="100">
      <animate attributeName="y1" values="100;269;100" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="100;269;100" dur="0.9s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Floating particles -->
  <g filter="url(#glow7)">
    <circle cx="30" cy="30" r="2" fill="#7c5cff" opacity="0.5">
      <animate attributeName="cy" values="30;199;30" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="270" cy="140" r="1.5" fill="#ff00ff" opacity="0.5">
      <animate attributeName="cy" values="140;-29;140" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="160" r="2.5" fill="#00ffff" opacity="0.6">
      <animate attributeName="cy" values="160;-9;160" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Title -->
  <text x="150" y="158" text-anchor="middle" font-family="Sora, sans-serif" font-size="16" font-weight="800" fill="url(#vrNeon)" filter="url(#glow6)">VOID RUNNER</text>
</svg>