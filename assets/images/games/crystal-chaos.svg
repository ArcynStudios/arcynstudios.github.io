<svg viewBox="0 0 300 169" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ccBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0510"/>
      <stop offset="50%" style="stop-color:#100515"/>
      <stop offset="100%" style="stop-color:#0a0510"/>
    </linearGradient>
    <linearGradient id="ccCrystal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff"/>
      <stop offset="50%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#ffff00"/>
    </linearGradient>
    <radialGradient id="ccGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="300" height="169" fill="url(#ccBg)"/>
  <!-- Cave walls with glow -->
  <g fill="#1a0a20" filter="url(#glow3)">
    <path d="M0,169 L0,100 Q50,80 100,100 L100,169 Z" opacity="0.6"/>
    <path d="M200,169 L200,100 Q250,80 300,100 L300,169 Z" opacity="0.6"/>
    <path d="M0,0 L0,60 Q50,80 100,60 L100,0 Z" opacity="0.4"/>
    <path d="M200,0 L200,60 Q250,80 300,60 L300,0 Z" opacity="0.4"/>
  </g>
  <!-- Crystal grid -->
  <g filter="url(#glow3)">
    <!-- Row 1 -->
    <polygon points="50,50 55,40 60,50 57,55 53,55" fill="#ff0066">
      <animateTransform attributeName="transform" type="rotate" from="0 55 50" to="360 55 50" dur="3s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="90,50 95,40 100,50 97,55 93,55" fill="#00d4ff">
      <animateTransform attributeName="transform" type="rotate" from="0 95 50" to="-360 95 50" dur="4s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="130,50 135,40 140,50 137,55 133,55" fill="#ffaa00">
      <animateTransform attributeName="transform" type="rotate" from="0 135 50" to="360 135 50" dur="2.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="170,50 175,40 180,50 177,55 173,55" fill="#7c5cff">
      <animateTransform attributeName="transform" type="rotate" from="0 175 50" to="-360 175 50" dur="3.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="210,50 215,40 220,50 217,55 213,55" fill="#00ff88">
      <animateTransform attributeName="transform" type="rotate" from="0 215 50" to="360 215 50" dur="2.8s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="250,50 255,40 260,50 257,55 253,55" fill="#ff5c8a">
      <animateTransform attributeName="transform" type="rotate" from="0 255 50" to="-360 255 50" dur="3.2s" repeatCount="indefinite"/>
    </polygon>
    <!-- Row 2 -->
    <polygon points="70,85 75,75 80,85 77,90 73,90" fill="#ff0066">
      <animateTransform attributeName="transform" type="rotate" from="0 75 85" to="360 75 85" dur="2.7s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="110,85 115,75 120,85 117,90 113,90" fill="#00d4ff">
      <animateTransform attributeName="transform" type="rotate" from="0 115 85" to="-360 115 85" dur="3.3s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="150,85 155,75 160,85 157,90 153,90" fill="#ffaa00">
      <animateTransform attributeName="transform" type="rotate" from="0 155 85" to="360 155 85" dur="3.1s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="190,85 195,75 200,85 197,90 193,90" fill="#7c5cff">
      <animateTransform attributeName="transform" type="rotate" from="0 195 85" to="-360 195 85" dur="2.9s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="230,85 235,75 240,85 237,90 233,90" fill="#00ff88">
      <animateTransform attributeName="transform" type="rotate" from="0 235 85" to="360 235 85" dur="3.4s" repeatCount="indefinite"/>
    </polygon>
    <!-- Row 3 -->
    <polygon points="50,120 55,110 60,120 57,125 53,125" fill="#ff5c8a">
      <animateTransform attributeName="transform" type="rotate" from="0 55 120" to="360 55 120" dur="2.6s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="90,120 95,110 100,120 97,125 93,125" fill="#ff0066">
      <animateTransform attributeName="transform" type="rotate" from="0 95 120" to="-360 95 120" dur="3.7s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="130,120 135,110 140,120 137,125 133,125" fill="#00d4ff">
      <animateTransform attributeName="transform" type="rotate" from="0 135 120" to="360 135 120" dur="2.4s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="170,120 175,110 180,120 177,125 173,125" fill="#ffaa00">
      <animateTransform attributeName="transform" type="rotate" from="0 175 120" to="-360 175 120" dur="3.6s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="210,120 215,110 220,120 217,125 213,125" fill="#7c5cff">
      <animateTransform attributeName="transform" type="rotate" from="0 215 120" to="360 215 120" dur="2.9s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="250,120 255,110 260,120 257,125 253,125" fill="#00ff88">
      <animateTransform attributeName="transform" type="rotate" from="0 255 120" to="-360 255 120" dur="3.3s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <!-- Special crystals (bomb, row clear, rainbow) -->
  <g filter="url(#glow3)">
    <polygon points="150,35 155,25 160,35 157,30 153,30" fill="#ffff00" stroke="#fff" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="0 155 35" to="360 155 35" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="100,25 105,15 110,25 107,20 103,20" fill="#00ffff" stroke="#fff" stroke-width="2">
      <animate attributeName="opacity" values="1;0.3;1" dur="0.8s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="200,25 205,15 210,25 207,20 203,20" fill="#ff00ff" stroke="#fff" stroke-width="2">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="0.8s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <!-- Glowing particles -->
  <g filter="url(#glow3)">
    <circle cx="30" cy="30" r="2" fill="#ff00ff">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="270" cy="40" r="1.5" fill="#00ffff">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="150" r="2.5" fill="#ffff00">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="140" r="1.5" fill="#ffaa00">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="220" cy="140" r="2" fill="#7c5cff">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Cave lighting -->
  <g opacity="0.15" filter="url(#glow3)">
    <ellipse cx="150" cy="100" rx="100" ry="60" fill="url(#ccGlow)"/>
    <ellipse cx="50" cy="140" rx="80" ry="40" fill="url(#ccGlow)"/>
    <ellipse cx="250" cy="140" rx="80" ry="40" fill="url(#ccGlow)"/>
  </g>
  <!-- Title -->
  <text x="150" y="155" text-anchor="middle" font-family="Sora, sans-serif" font-size="16" font-weight="800" fill="url(#ccCrystal)" filter="url(#glow3)">CRYSTAL CHAOS</text>
</svg>