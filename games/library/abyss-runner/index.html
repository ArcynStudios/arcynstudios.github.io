<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Abyss Runner</title>
  <link rel="icon" type="image/svg+xml" href="../../../assets/icons/favicon.svg" />
  <link rel="stylesheet" href="../shared/theme.css" />
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div class="game-stage" id="main-content">
    <canvas id="c" aria-label="Abyss Runner game canvas"></canvas>

    <div class="hud">
      <span class="hud__pill">🏃 <span id="score">0</span>m</span>
      <span class="hud__pill">🏆 <span id="best">0</span>m</span>
    </div>

    <div class="touch-pad">
      <div class="touch-pad__group"></div>
      <div class="touch-pad__group">
        <button class="touch-btn" id="btn-duck" aria-label="Duck">▼</button>
        <button class="touch-btn" id="btn-jump" aria-label="Jump">▲</button>
      </div>
    </div>

    <div class="overlay" id="overlay">
      <h1>Abyss Runner</h1>
      <p>Space / tap to jump, hold ↓ to duck under low obstacles. Survive as long as you can.</p>
      <button class="g-btn" id="start-btn">Run</button>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
