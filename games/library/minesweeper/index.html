<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Minesweeper</title>
<link rel="icon" type="image/svg+xml" href="../../../assets/icons/favicon.svg" />
<link rel="stylesheet" href="../shared/theme.css" />
<style>
  html, body { touch-action: pan-y; }
  .wrap { display:flex; flex-direction:column; align-items:center; gap:12px; padding:12px; height:100%; justify-content:center; }
  .board { display:grid; gap:2px; width:min(94vw,440px); background:rgba(255,255,255,0.08); padding:6px; border-radius:12px; border:1px solid var(--g-border); }
  .cell { aspect-ratio:1; display:flex; align-items:center; justify-content:center; background:#2a2a3d; border-radius:2px; cursor:pointer; font-weight:800; font-size:clamp(9px,3vw,15px); user-select:none; }
  .cell.revealed { background:rgba(255,255,255,0.04); cursor:default; }
  .cell.mine { background:var(--g-pink); }
  .cell.flag::after { content:'🚩'; font-size:0.9em; }
  .cell.n1 { color:#22d3ee; } .cell.n2 { color:#35e0a1; } .cell.n3 { color:#ff5c8a; }
  .cell.n4 { color:#7c5cff; } .cell.n5 { color:#ffb444; } .cell.n6 { color:#5cffb8; }
  .cell.n7 { color:#fff; } .cell.n8 { color:#a8a8bd; }
  .flag-toggle.is-active { background:rgba(255,180,68,0.25); border-color:var(--g-amber); }
</style>
</head>
<body>`n  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div class="game-stage" id="main-content">
    <div class="hud">
      <span class="hud__pill">💣 <span id="mine-count">10</span></span>
      <span class="hud__pill">⏱ <span id="time">0:00</span></span>
      <div class="hud__controls">
        <button class="icon-btn flag-toggle" id="flag-toggle" aria-label="Toggle flag mode">🚩</button>
        <button class="icon-btn" id="mute-btn" aria-label="Toggle sound">🔊</button>
        <button class="icon-btn" id="restart-btn" aria-label="Restart">↺</button>
      </div>
    </div>

    <div class="wrap">
      <div class="board" id="board" role="grid" aria-label="Minesweeper grid"></div>
      <div class="option-row" id="diff-row">
        <button class="option-btn" data-diff="easy">Easy · 8×8</button>
        <button class="option-btn is-active" data-diff="medium">Medium · 12×12</button>
        <button class="option-btn" data-diff="hard">Hard · 16×16</button>
      </div>
    </div>

    <div class="overlay" id="overlay">
      <h1>Minesweeper</h1>
      <ul class="how-to-list">
        <li>Tap a cell to reveal it — numbers show nearby mines.</li>
        <li>Right-click, long-press, or use the flag toggle to mark suspected mines.</li>
        <li>Reveal every safe cell to win. Your first tap is always safe.</li>
      </ul>
      <button class="g-btn" id="start-btn">Play</button>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
