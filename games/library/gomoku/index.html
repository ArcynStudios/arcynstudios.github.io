<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Gomoku</title>
<link rel="icon" type="image/svg+xml" href="../../../assets/icons/favicon.svg" />
<link rel="stylesheet" href="../shared/theme.css" />
<style>
  html, body { touch-action: pan-y; }
  .wrap { display:flex; flex-direction:column; align-items:center; gap:12px; padding:12px; height:100%; justify-content:center; }
  .board { display:grid; grid-template-columns:repeat(15,1fr); gap:2px; width:min(94vw,480px); aspect-ratio:1; background:rgba(255,255,255,0.08); padding:6px; border-radius:12px; border:1px solid var(--g-border); }
  .cell { background:rgba(255,255,255,0.04); border-radius:2px; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; }
  .cell:hover::before { content:''; position:absolute; inset:1px; border-radius:2px; background:rgba(255,255,255,0.1); }
  .stone { width:78%; height:78%; border-radius:50%; }
  .stone.p1 { background:radial-gradient(circle at 35% 30%, #6de8ff, var(--g-cyan)); box-shadow:0 0 6px var(--g-cyan); animation:pop 180ms ease; }
  .stone.p2 { background:radial-gradient(circle at 35% 30%, #ff9dc0, var(--g-pink)); box-shadow:0 0 6px var(--g-pink); animation:pop 180ms ease; }
  .cell.win .stone { outline:2px solid var(--g-success); }
  @keyframes pop { from{transform:scale(0.3);opacity:0;} to{transform:scale(1);opacity:1;} }
</style>
</head>
<body>
  <div class="game-stage">
    <div class="hud">
      <span class="hud__pill" id="turn-indicator">Your turn</span>
      <div class="hud__controls">
        <button class="icon-btn" id="mute-btn" aria-label="Toggle sound">🔊</button>
        <button class="icon-btn" id="restart-btn" aria-label="Restart">↺</button>
      </div>
    </div>

    <div class="wrap">
      <div class="stat-row">
        <span>Wins <strong id="stat-wins">0</strong></span>
        <span>Losses <strong id="stat-losses">0</strong></span>
        <span>Draws <strong id="stat-draws">0</strong></span>
      </div>
      <div class="board" id="board" role="grid" aria-label="Gomoku board"></div>
      <div class="option-row" id="mode-row">
        <button class="option-btn is-active" data-mode="ai-easy">Vs AI · Easy</button>
        <button class="option-btn" data-mode="ai-hard">Vs AI · Hard</button>
        <button class="option-btn" data-mode="two-player">2 Player</button>
      </div>
    </div>

    <div class="overlay" id="overlay">
      <h1>Gomoku</h1>
      <ul class="how-to-list">
        <li>Tap an intersection to place your stone.</li>
        <li>Be the first to line up five stones — any direction.</li>
        <li>Choose an AI difficulty or play locally with a friend.</li>
      </ul>
      <button class="g-btn" id="start-btn">Play</button>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
