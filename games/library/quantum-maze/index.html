<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Quantum Maze</title>
<link rel="icon" type="image/svg+xml" href="../../../assets/icons/favicon.svg" />
<link rel="stylesheet" href="../shared/theme.css" />
</head>
<body>
  <div class="game-stage">
    <canvas id="c" aria-label="Quantum Maze game canvas"></canvas>

    <div class="hud">
      <span class="hud__pill">⏱ <span id="time">0:00</span></span>
      <span class="hud__pill">🧩 Level <span id="level">1</span></span>
    </div>

    <div class="touch-pad">
      <div class="touch-pad__group">
        <button class="touch-btn" id="btn-left" aria-label="Move left">◀</button>
        <button class="touch-btn" id="btn-right" aria-label="Move right">▶</button>
      </div>
      <div class="touch-pad__group">
        <button class="touch-btn" id="btn-up" aria-label="Move up">▲</button>
        <button class="touch-btn" id="btn-down" aria-label="Move down">▼</button>
      </div>
    </div>

    <div class="overlay" id="overlay">
      <h1>Quantum Maze</h1>
      <p>Navigate the shifting corridors to the exit. A new maze generates every level — arrow keys / WASD to move.</p>
      <button class="g-btn" id="start-btn">Enter Maze</button>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
