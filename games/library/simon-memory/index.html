<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Simon Memory</title>
<link rel="icon" type="image/svg+xml" href="../../../assets/icons/favicon.svg" />
<link rel="stylesheet" href="../shared/theme.css" />
<style>
  html, body { touch-action: pan-y; }
  .wrap { display:flex; flex-direction:column; align-items:center; gap:18px; padding:16px; height:100%; justify-content:center; }
  .simon-board { position:relative; width:min(80vw,320px); aspect-ratio:1; border-radius:50%; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:10px; padding:10px; background:#111; box-shadow:0 0 0 8px #1c1c28; }
  .pad { border:none; cursor:pointer; opacity:0.55; transition:opacity 120ms ease, filter 120ms ease; }
  .pad.tl { border-radius:100% 0 0 0; background:#22d3ee; }
  .pad.tr { border-radius:0 100% 0 0; background:#ff5c8a; }
  .pad.bl { border-radius:0 0 0 100%; background:#ffb444; }
  .pad.br { border-radius:0 0 100% 0; background:#7c5cff; }
  .pad.active { opacity:1; filter:brightness(1.6); }
  .center-badge { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:34%; height:34%; border-radius:50%; background:#0a0a12; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:1.4rem; z-index:2; pointer-events:none; }
</style>
</head>
<body>
  <div class="game-stage">
    <div class="hud">
      <span class="hud__pill">🏆 <span id="best">0</span></span>
      <div class="hud__controls">
        <button class="icon-btn" id="mute-btn" aria-label="Toggle sound">🔊</button>
        <button class="icon-btn" id="restart-btn" aria-label="Restart">↺</button>
      </div>
    </div>

    <div class="wrap">
      <div class="simon-board" id="board">
        <button class="pad tl" data-pad="0"></button>
        <button class="pad tr" data-pad="1"></button>
        <button class="pad bl" data-pad="2"></button>
        <button class="pad br" data-pad="3"></button>
        <div class="center-badge" id="round">0</div>
      </div>
      <div class="option-row" id="speed-row">
        <button class="option-btn" data-speed="slow">Slow</button>
        <button class="option-btn is-active" data-speed="normal">Normal</button>
        <button class="option-btn" data-speed="fast">Fast</button>
      </div>
    </div>

    <div class="overlay" id="overlay">
      <h1>Simon Memory</h1>
      <ul class="how-to-list">
        <li>Watch the sequence of lights and sounds.</li>
        <li>Repeat it back by tapping the pads in order.</li>
        <li>Each round adds one more step. How far can you go?</li>
      </ul>
      <button class="g-btn" id="start-btn">Play</button>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
