<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Memory Match</title>
<link rel="icon" type="image/svg+xml" href="../../../assets/icons/favicon.svg" />
<link rel="stylesheet" href="../shared/theme.css" />
<style>
  html, body { touch-action: pan-y; }
  .wrap { display:flex; flex-direction:column; align-items:center; gap:14px; padding:16px; height:100%; justify-content:center; }
  .board { display:grid; gap:8px; width:min(92vw,420px); }
  .card { aspect-ratio:1; border-radius:12px; cursor:pointer; position:relative; perspective:600px; }
  .card-inner { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform 350ms ease; }
  .card.flipped .card-inner, .card.matched .card-inner { transform:rotateY(180deg); }
  .card-face { position:absolute; inset:0; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:clamp(1.4rem,6vw,2rem); backface-visibility:hidden; }
  .card-back { background:var(--g-panel); border:1px solid var(--g-border); }
  .card-back::after { content:'?'; color:var(--g-text-dim); font-weight:800; }
  .card-front { background:linear-gradient(135deg,#7c5cff,#22d3ee); transform:rotateY(180deg); }
  .card.matched .card-front { background:linear-gradient(135deg,#35e0a1,#22d3ee); }
</style>
</head>
<body>
  <div class="game-stage">
    <div class="hud">
      <span class="hud__pill">🔄 <span id="moves">0</span></span>
      <span class="hud__pill">⏱ <span id="time">0:00</span></span>
      <div class="hud__controls">
        <button class="icon-btn" id="mute-btn" aria-label="Toggle sound">🔊</button>
        <button class="icon-btn" id="restart-btn" aria-label="Restart">↺</button>
      </div>
    </div>

    <div class="wrap">
      <div class="board" id="board" role="grid" aria-label="Memory match grid"></div>
      <div class="option-row" id="diff-row">
        <button class="option-btn" data-diff="easy">Easy · 4×3</button>
        <button class="option-btn is-active" data-diff="medium">Medium · 4×4</button>
        <button class="option-btn" data-diff="hard">Hard · 6×4</button>
      </div>
    </div>

    <div class="overlay" id="overlay">
      <h1>Memory Match</h1>
      <ul class="how-to-list">
        <li>Flip two cards per turn to reveal them.</li>
        <li>Matching pairs stay face up.</li>
        <li>Clear the board in as few moves as possible.</li>
      </ul>
      <button class="g-btn" id="start-btn">Play</button>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
