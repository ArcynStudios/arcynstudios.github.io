<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Pixel Kingdoms</title>
<link rel="icon" type="image/svg+xml" href="../../../assets/icons/favicon.svg" />
<link rel="stylesheet" href="../shared/theme.css" />
<style>
  .kingdoms-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 16px;
    width: 100%;
    height: 100%;
    justify-content: center;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 3px;
    width: min(92vw, 460px);
    aspect-ratio: 1;
    background: rgba(255,255,255,0.06);
    padding: 6px;
    border-radius: 12px;
    border: 1px solid var(--g-border);
  }
  .tile {
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    cursor: pointer;
    transition: transform 120ms ease, background 150ms ease;
    border: 1px solid transparent;
  }
  .tile.capturable { border-color: rgba(34,211,238,0.6); }
  .tile.capturable:hover { transform: scale(1.08); }
  .tile.player { background: linear-gradient(135deg,#7c5cff,#22d3ee); }
  .tile.ai { background: linear-gradient(135deg,#ff5c8a,#ffb444); }
  .kingdoms-status {
    display: flex;
    gap: 18px;
    font-weight: 700;
    font-size: 14px;
  }
  .kingdoms-status span.you { color: var(--g-cyan); }
  .kingdoms-status span.rival { color: var(--g-pink); }
</style>
</head>
<body>
  <div class="game-stage">
    <div class="kingdoms-wrap">
      <div class="kingdoms-status">
        <div>You: <span class="you" id="you-count">1</span> tiles</div>
        <div>Rival: <span class="rival" id="ai-count">1</span> tiles</div>
        <div id="turns-left">30 turns left</div>
      </div>
      <div class="board" id="board" role="grid" aria-label="Territory grid"></div>
    </div>

    <div class="overlay" id="overlay">
      <h1>Pixel Kingdoms</h1>
      <p>Claim territory one tile at a time. Click any highlighted tile touching your kingdom to capture it, then your rival takes their turn. Control the most land when the map fills.</p>
      <button class="g-btn" id="start-btn">Found Kingdom</button>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
