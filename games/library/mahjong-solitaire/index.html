<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Mahjong Solitaire</title>
<link rel="icon" type="image/svg+xml" href="../../../assets/icons/favicon.svg" />
<link rel="stylesheet" href="../shared/theme.css" />
<style>
  html, body { touch-action: pan-y; overflow:auto; }
  .wrap { display:flex; flex-direction:column; align-items:center; gap:14px; padding:16px; min-height:100%; justify-content:center; }
  .board { position:relative; width:min(94vw,540px); aspect-ratio:9/7; }
  .tile { position:absolute; display:flex; align-items:center; justify-content:center; background:linear-gradient(160deg,#f4f4fa,#d8d8e8); border-radius:6px; border:1px solid rgba(0,0,0,0.2); box-shadow:0 2px 0 rgba(0,0,0,0.25); font-size:clamp(14px,3vw,22px); cursor:pointer; transition:filter 150ms ease, transform 150ms ease; }
  .tile.blocked { filter:brightness(0.6) saturate(0.6); cursor:default; }
  .tile.selected { outline:3px solid var(--g-cyan); transform:translateY(-3px); }
  .tile.matched { opacity:0; pointer-events:none; transform:scale(0.4); }
</style>
</head>
<body>
  <div class="game-stage">
    <div class="hud">
      <span class="hud__pill">🀄 <span id="remaining">0</span> pairs left</span>
      <span class="hud__pill">⏱ <span id="time">0:00</span></span>
      <div class="hud__controls">
        <button class="icon-btn" id="mute-btn" aria-label="Toggle sound">🔊</button>
        <button class="icon-btn" id="shuffle-btn" aria-label="Shuffle remaining tiles">🔀</button>
        <button class="icon-btn" id="restart-btn" aria-label="Restart">↺</button>
      </div>
    </div>

    <div class="wrap">
      <div class="board" id="board"></div>
    </div>

    <div class="overlay" id="overlay">
      <h1>Mahjong Solitaire</h1>
      <ul class="how-to-list">
        <li>Tap two matching free tiles to remove them.</li>
        <li>A tile is free if nothing sits on top of it and one side is open.</li>
        <li>Clear every tile to win. Stuck? Tap shuffle to rearrange what's left.</li>
      </ul>
      <button class="g-btn" id="start-btn">Play</button>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
