<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tic Tac Toe</title>
  <link rel="icon" type="image/svg+xml" href="../../../assets/icons/favicon.svg" />
  <link rel="stylesheet" href="../shared/theme.css" />
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div class="game-stage" id="main-content">
    <div class="hud">
      <span class="hud__pill" id="turn-indicator">Your turn (X)</span>
      <div class="hud__controls">
        <button class="icon-btn" id="mute-btn" aria-label="Toggle sound">🔊</button>
        <button class="icon-btn" id="restart-btn" aria-label="Restart">↺</button>
      </div>
    </div>

    <div class="wrap">
      <div class="stat-row">
        <span>Wins <strong id="stat-wins">0</strong></span>
        <span>Losses <strong id="stat-losses">0</strong></span>
        <span>Draws <strong id="stat-draws">0</strong></span>
      </div>
      <div class="board" id="board" role="grid" aria-label="Tic Tac Toe board"></div>
      <div class="option-row" id="mode-row">
        <button class="option-btn is-active" data-mode="ai-easy">Vs AI · Easy</button>
        <button class="option-btn" data-mode="ai-hard">Vs AI · Hard</button>
        <button class="option-btn" data-mode="two-player">2 Player</button>
      </div>
    </div>

    <div class="overlay" id="overlay">
      <h1>Tic Tac Toe</h1>
      <ul class="how-to-list">
        <li>Tap a square to place your mark.</li>
        <li>Get three in a row — horizontal, vertical, or diagonal — to win.</li>
        <li>Choose an AI difficulty or play locally with a friend.</li>
      </ul>
      <button class="g-btn" id="start-btn">Play</button>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
