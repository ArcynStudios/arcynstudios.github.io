<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Tic Tac Toe</title>
<link rel="icon" type="image/svg+xml" href="../../../assets/icons/favicon.svg" />
<link rel="stylesheet" href="../shared/theme.css" />
<style>
  html, body { touch-action: pan-y; }
  .wrap { display:flex; flex-direction:column; align-items:center; gap:16px; padding:16px; height:100%; justify-content:center; }
  .board { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; width:min(86vw,340px); aspect-ratio:1; }
  .cell { display:flex; align-items:center; justify-content:center; background:var(--g-panel); border:1px solid var(--g-border); border-radius:14px; font-size:clamp(2rem,10vw,3rem); font-weight:800; cursor:pointer; transition:background 150ms ease, transform 150ms ease; }
  .cell:hover { background:rgba(255,255,255,0.1); }
  .cell:active { transform:scale(0.95); }
  .cell.x { color:var(--g-cyan); }
  .cell.o { color:var(--g-pink); }
  .cell.win { background:rgba(53,224,161,0.18); border-color:var(--g-success); }
  .cell.placed { animation:pop 220ms ease; }
  @keyframes pop { from{transform:scale(0.5);opacity:0;} to{transform:scale(1);opacity:1;} }
</style>
</head>
<body>
  <div class="game-stage">
    <div class="hud">
      <span class="hud__pill" id="turn-indicator">Your turn (X)</span>
      <div class="hud__controls">
        <button class="icon-btn" id="mute-btn" aria-label="Toggle sound">🔊</button>
        <button class="icon-btn" id="restart-btn" aria-label="Restart">↺</button>
      </div>
    </div>

    <div class="wrap">
      <div class="stat-row">
        <span>Wins <strong id="stat-wins">0</strong></span>
        <span>Losses <strong id="stat-losses">0</strong></span>
        <span>Draws <strong id="stat-draws">0</strong></span>
      </div>
      <div class="board" id="board" role="grid" aria-label="Tic Tac Toe board"></div>
      <div class="option-row" id="mode-row">
        <button class="option-btn is-active" data-mode="ai-easy">Vs AI · Easy</button>
        <button class="option-btn" data-mode="ai-hard">Vs AI · Hard</button>
        <button class="option-btn" data-mode="two-player">2 Player</button>
      </div>
    </div>

    <div class="overlay" id="overlay">
      <h1>Tic Tac Toe</h1>
      <ul class="how-to-list">
        <li>Tap a square to place your mark.</li>
        <li>Get three in a row — horizontal, vertical, or diagonal — to win.</li>
        <li>Choose an AI difficulty or play locally with a friend.</li>
      </ul>
      <button class="g-btn" id="start-btn">Play</button>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
