<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Dots and Boxes</title>
<link rel="icon" type="image/svg+xml" href="../../../assets/icons/favicon.svg" />
<link rel="stylesheet" href="../shared/theme.css" />
<style>
  html, body { touch-action: pan-y; }
  .wrap { display:flex; flex-direction:column; align-items:center; gap:12px; padding:12px; height:100%; justify-content:center; }
  .grid { display:grid; background:transparent; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--g-text-dim); justify-self:center; align-self:center; }
  .hedge, .vedge { background:rgba(255,255,255,0.12); border-radius:3px; cursor:pointer; transition:background 120ms ease; }
  .hedge:hover, .vedge:hover { background:rgba(255,255,255,0.3); }
  .hedge.filled.p1, .vedge.filled.p1 { background:var(--g-cyan); }
  .hedge.filled.p2, .vedge.filled.p2 { background:var(--g-pink); }
  .box { display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.9rem; border-radius:4px; opacity:0; transition:opacity 200ms ease; }
  .box.owned { opacity:1; }
  .box.p1 { background:rgba(34,211,238,0.25); color:var(--g-cyan); }
  .box.p2 { background:rgba(255,92,138,0.25); color:var(--g-pink); }
</style>
</head>
<body>
  <div class="game-stage">
    <div class="hud">
      <span class="hud__pill" id="turn-indicator">Your turn</span>
      <div class="hud__controls">
        <button class="icon-btn" id="mute-btn" aria-label="Toggle sound">🔊</button>
        <button class="icon-btn" id="restart-btn" aria-label="Restart">↺</button>
      </div>
    </div>

    <div class="wrap">
      <div class="stat-row">
        <span>You <strong id="score-p1">0</strong></span>
        <span>Opponent <strong id="score-p2">0</strong></span>
        <span>Wins <strong id="stat-wins">0</strong></span>
      </div>
      <div class="grid" id="grid" role="grid" aria-label="Dots and boxes grid"></div>
      <div class="option-row" id="mode-row">
        <button class="option-btn is-active" data-mode="ai-easy">Vs AI · Easy</button>
        <button class="option-btn" data-mode="ai-hard">Vs AI · Hard</button>
        <button class="option-btn" data-mode="two-player">2 Player</button>
      </div>
    </div>

    <div class="overlay" id="overlay">
      <h1>Dots and Boxes</h1>
      <ul class="how-to-list">
        <li>Tap a line to draw it between two dots.</li>
        <li>Complete the fourth side of a box to claim it and go again.</li>
        <li>Most boxes when the grid is full wins.</li>
      </ul>
      <button class="g-btn" id="start-btn">Play</button>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
