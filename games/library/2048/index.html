<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>2048</title>
<link rel="icon" type="image/svg+xml" href="../../../assets/icons/favicon.svg" />
<link rel="stylesheet" href="../shared/theme.css" />
<style>
  html, body { touch-action: pan-y; }
  .wrap { display:flex; flex-direction:column; align-items:center; gap:14px; padding:16px; height:100%; justify-content:center; }
  .board { position:relative; display:grid; grid-template-columns:repeat(4,1fr); grid-template-rows:repeat(4,1fr); gap:10px; width:min(90vw,380px); aspect-ratio:1; background:rgba(255,255,255,0.06); padding:10px; border-radius:16px; border:1px solid var(--g-border); touch-action:none; }
  .cell-bg { background:rgba(255,255,255,0.04); border-radius:8px; }
  .tile { position:absolute; display:flex; align-items:center; justify-content:center; border-radius:8px; font-weight:800; font-size:clamp(1rem,6vw,1.6rem); color:#0a0a12; transition:top 120ms ease, left 120ms ease; }
  .tile.spawn { animation:pop 180ms ease; }
  .tile.merged { animation:merge 180ms ease; }
  @keyframes pop { from{transform:scale(0.3);opacity:0.3;} to{transform:scale(1);opacity:1;} }
  @keyframes merge { 0%{transform:scale(1);} 50%{transform:scale(1.15);} 100%{transform:scale(1);} }
</style>
</head>
<body>
  <div class="game-stage">
    <div class="hud">
      <span class="hud__pill">⭐ <span id="score">0</span></span>
      <span class="hud__pill">🏆 <span id="best">0</span></span>
      <div class="hud__controls">
        <button class="icon-btn" id="mute-btn" aria-label="Toggle sound">🔊</button>
        <button class="icon-btn" id="restart-btn" aria-label="Restart">↺</button>
      </div>
    </div>

    <div class="wrap">
      <div class="board" id="board"></div>
    </div>

    <div class="touch-pad" style="justify-content:center;">
      <p style="color:var(--g-text-dim); font-size:12px; margin:0;">Swipe on the board, or use arrow keys / WASD</p>
    </div>

    <div class="overlay" id="overlay">
      <h1>2048</h1>
      <ul class="how-to-list">
        <li>Swipe (or use arrow keys) to slide every tile at once.</li>
        <li>Matching tiles merge into their sum.</li>
        <li>Reach the 2048 tile — or just keep going for a high score.</li>
      </ul>
      <button class="g-btn" id="start-btn">Play</button>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
