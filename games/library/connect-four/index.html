<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Connect Four</title>
<link rel="icon" type="image/svg+xml" href="../../../assets/icons/favicon.svg" />
<link rel="stylesheet" href="../shared/theme.css" />
<style>
  html, body { touch-action: pan-y; }
  .wrap { display:flex; flex-direction:column; align-items:center; gap:14px; padding:16px; height:100%; justify-content:center; }
  .board { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; width:min(92vw,420px); aspect-ratio:7/6; background:rgba(255,255,255,0.05); padding:8px; border-radius:16px; border:1px solid var(--g-border); }
  .col { display:flex; flex-direction:column-reverse; gap:6px; cursor:pointer; }
  .slot { border-radius:50%; background:rgba(255,255,255,0.06); aspect-ratio:1; position:relative; }
  .slot.p1 { background:var(--g-cyan); box-shadow:0 0 10px var(--g-cyan); }
  .slot.p2 { background:var(--g-pink); box-shadow:0 0 10px var(--g-pink); }
  .slot.drop { animation:drop 260ms cubic-bezier(.5,0,.5,1.4); }
  .slot.win { outline:3px solid var(--g-success); }
  @keyframes drop { from{transform:translateY(-220%);opacity:0.4;} to{transform:translateY(0);opacity:1;} }
  .col:hover .slot:not(.p1):not(.p2) { background:rgba(255,255,255,0.14); }
</style>
</head>
<body>`n  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div class="game-stage" id="main-content">
    <div class="hud">
      <span class="hud__pill" id="turn-indicator">Your turn</span>
      <div class="hud__controls">
        <button class="icon-btn" id="mute-btn" aria-label="Toggle sound">🔊</button>
        <button class="icon-btn" id="restart-btn" aria-label="Restart">↺</button>
      </div>
    </div>

    <div class="wrap">
      <div class="stat-row">
        <span>Wins <strong id="stat-wins">0</strong></span>
        <span>Losses <strong id="stat-losses">0</strong></span>
        <span>Draws <strong id="stat-draws">0</strong></span>
      </div>
      <div class="board" id="board" role="grid" aria-label="Connect Four board"></div>
      <div class="option-row" id="mode-row">
        <button class="option-btn is-active" data-mode="ai-easy">Vs AI · Easy</button>
        <button class="option-btn" data-mode="ai-hard">Vs AI · Hard</button>
        <button class="option-btn" data-mode="two-player">2 Player</button>
      </div>
    </div>

    <div class="overlay" id="overlay">
      <h1>Connect Four</h1>
      <ul class="how-to-list">
        <li>Tap a column to drop your disc.</li>
        <li>Connect four discs in a row — horizontal, vertical, or diagonal.</li>
        <li>Choose an AI difficulty or play locally with a friend.</li>
      </ul>
      <button class="g-btn" id="start-btn">Play</button>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
