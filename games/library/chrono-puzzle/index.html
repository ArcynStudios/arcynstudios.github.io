<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Chrono Puzzle</title>
<link rel="icon" type="image/svg+xml" href="../../../assets/icons/favicon.svg" />
<link rel="stylesheet" href="../shared/theme.css" />
<style>
  .puzzle-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 16px;
    height: 100%;
    justify-content: center;
  }
  .puzzle-status {
    display: flex;
    gap: 20px;
    font-weight: 700;
    font-size: 14px;
  }
  .puzzle-status .time { color: var(--g-cyan); }
  .puzzle-status .moves { color: var(--g-amber); }
  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 6px;
    width: min(88vw, 380px);
    aspect-ratio: 1;
    background: rgba(255,255,255,0.05);
    padding: 8px;
    border-radius: 14px;
    border: 1px solid var(--g-border);
  }
  .tile {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1.1rem, 5vw, 1.6rem);
    font-weight: 800;
    border-radius: 8px;
    background: linear-gradient(135deg,#7c5cff,#22d3ee);
    cursor: pointer;
    transition: transform 120ms ease;
    user-select: none;
  }
  .tile:active { transform: scale(0.94); }
  .tile.blank { background: transparent; cursor: default; }
</style>
</head>
<body>
  <div class="game-stage">
    <div class="puzzle-wrap">
      <div class="puzzle-status">
        <div class="time">⏱ <span id="time">0:00</span></div>
        <div class="moves">🔀 <span id="moves">0</span> moves</div>
      </div>
      <div class="board" id="board" role="grid" aria-label="Sliding puzzle grid"></div>
    </div>

    <div class="overlay" id="overlay">
      <h1>Chrono Puzzle</h1>
      <p>Slide the tiles into numeric order, 1 through 15, with the blank in the bottom-right. Click any tile next to the blank to slide it.</p>
      <button class="g-btn" id="start-btn">Shuffle & Start</button>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
