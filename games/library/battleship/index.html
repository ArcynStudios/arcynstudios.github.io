<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Battleship</title>
<link rel="icon" type="image/svg+xml" href="../../../assets/icons/favicon.svg" />
<link rel="stylesheet" href="../shared/theme.css" />
<style>
  html, body { touch-action: pan-y; overflow-y:auto; }
  .wrap { display:flex; flex-direction:column; align-items:center; gap:12px; padding:16px; min-height:100%; justify-content:center; }
  .board { display:grid; grid-template-columns:repeat(8,1fr); gap:3px; width:min(92vw,360px); aspect-ratio:1; background:rgba(255,255,255,0.05); padding:6px; border-radius:12px; border:1px solid var(--g-border); }
  .cell { background:#12203a; border-radius:3px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:0.9rem; }
  .cell.ship { background:#2c4a7c; }
  .cell.hit { background:var(--g-pink); }
  .cell.miss { background:rgba(255,255,255,0.12); }
  .cell.sunk { background:#7a1f3d; }
  .cell.preview { background:rgba(53,224,161,0.4); }
  .cell.preview-bad { background:rgba(255,92,138,0.4); }
  .fleet-row { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .fleet-chip { padding:6px 12px; border-radius:999px; background:var(--g-panel); border:1px solid var(--g-border); font-size:12px; font-weight:700; }
  .fleet-chip.placed { opacity:0.4; text-decoration:line-through; }
  .gate { display:flex; flex-direction:column; align-items:center; gap:14px; text-align:center; }
</style>
</head>
<body>
  <div class="game-stage" style="align-items:flex-start; overflow-y:auto;">
    <div class="hud">
      <span class="hud__pill" id="phase-indicator">Player 1: Place Ships</span>
      <div class="hud__controls">
        <button class="icon-btn" id="mute-btn" aria-label="Toggle sound">🔊</button>
        <button class="icon-btn" id="restart-btn" aria-label="Restart">↺</button>
      </div>
    </div>

    <div class="wrap" id="wrap">
      <div class="board" id="board" role="grid" aria-label="Battleship grid"></div>
      <div class="fleet-row" id="fleet-row"></div>
      <div class="option-row" id="controls-row"></div>
    </div>

    <div class="overlay" id="overlay">
      <h1>Battleship</h1>
      <ul class="how-to-list">
        <li>Two players, one device. Each player secretly places their fleet.</li>
        <li>Take turns firing at your opponent's grid — hit every ship cell to sink it.</li>
        <li>Sink the entire enemy fleet first to win.</li>
      </ul>
      <button class="g-btn" id="start-btn">Start</button>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
