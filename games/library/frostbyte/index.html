<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Frostbyte</title>
<link rel="icon" type="image/svg+xml" href="../../../assets/icons/favicon.svg" />
<link rel="stylesheet" href="../shared/theme.css" />
</head>
<body>
  <div class="game-stage">
    <canvas id="c" aria-label="Frostbyte game canvas"></canvas>

    <div class="hud">
      <span class="hud__pill">💎 <span id="score">0</span></span>
      <span class="hud__pill">🗺 Zone <span id="zone">1</span></span>
      <span class="hud__pill">❄ <span id="lives">3</span></span>
    </div>

    <div class="touch-pad">
      <div class="touch-pad__group">
        <button class="touch-btn" id="btn-left" aria-label="Move left">◀</button>
        <button class="touch-btn" id="btn-right" aria-label="Move right">▶</button>
      </div>
      <div class="touch-pad__group">
        <button class="touch-btn" id="btn-up" aria-label="Move up">▲</button>
        <button class="touch-btn" id="btn-down" aria-label="Move down">▼</button>
      </div>
    </div>

    <div class="overlay" id="overlay">
      <h1>Frostbyte</h1>
      <p>Explore the frozen expanse and collect every shard. Avoid the drifting frost wisps — they'll cost you a life on contact.</p>
      <button class="g-btn" id="start-btn">Begin Expedition</button>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
