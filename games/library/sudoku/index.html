<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Sudoku</title>
<link rel="icon" type="image/svg+xml" href="../../../assets/icons/favicon.svg" />
<link rel="stylesheet" href="../shared/theme.css" />
<style>
  html, body { touch-action: pan-y; overflow-y:auto; }
  .wrap { display:flex; flex-direction:column; align-items:center; gap:12px; padding:12px; min-height:100%; justify-content:center; }
  .board { display:grid; grid-template-columns:repeat(9,1fr); width:min(92vw,400px); aspect-ratio:1; background:#171728; border:2px solid var(--g-border); border-radius:8px; overflow:hidden; }
  .cell { display:flex; align-items:center; justify-content:center; font-size:clamp(0.9rem,4vw,1.2rem); font-weight:700; cursor:pointer; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); color:var(--g-cyan); position:relative; }
  .cell.given { color:var(--g-text); cursor:default; }
  .cell:nth-child(3n) { border-right:2px solid var(--g-border); }
  .cell:nth-child(9n+1) { border-left:none; }
  .row-3 .cell, .cell.thick-bottom { border-bottom:2px solid var(--g-border); }
  .cell.selected { background:rgba(124,92,255,0.3); }
  .cell.peer { background:rgba(124,92,255,0.1); }
  .cell.wrong { color:var(--g-pink); animation:shake 300ms ease; }
  .cell.same-value { background:rgba(34,211,238,0.18); }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-3px);} 75%{transform:translateX(3px);} }
  .numpad { display:grid; grid-template-columns:repeat(9,1fr); gap:6px; width:min(92vw,400px); }
  .num-btn { aspect-ratio:1; border:1px solid var(--g-border); background:var(--g-panel); color:var(--g-text); border-radius:8px; font-weight:700; cursor:pointer; }
  .num-btn:active { background:rgba(255,255,255,0.15); }
</style>
</head>
<body>
  <div class="game-stage" style="align-items:flex-start; overflow-y:auto;">
    <div class="hud">
      <span class="hud__pill">⏱ <span id="time">0:00</span></span>
      <span class="hud__pill">❌ <span id="mistakes">0</span>/3</span>
      <div class="hud__controls">
        <button class="icon-btn" id="mute-btn" aria-label="Toggle sound">🔊</button>
        <button class="icon-btn" id="restart-btn" aria-label="Restart">↺</button>
      </div>
    </div>

    <div class="wrap">
      <div class="board" id="board" role="grid" aria-label="Sudoku grid"></div>
      <div class="numpad" id="numpad"></div>
      <div class="option-row" id="diff-row">
        <button class="option-btn" data-diff="easy">Easy</button>
        <button class="option-btn is-active" data-diff="medium">Medium</button>
        <button class="option-btn" data-diff="hard">Hard</button>
      </div>
    </div>

    <div class="overlay" id="overlay">
      <h1>Sudoku</h1>
      <ul class="how-to-list">
        <li>Select a cell, then tap a number (or use your keyboard).</li>
        <li>Fill every row, column, and 3×3 box with 1–9, no repeats.</li>
        <li>Three mistakes and it's game over — choose your difficulty wisely.</li>
      </ul>
      <button class="g-btn" id="start-btn">Play</button>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
